<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <style>
        /* =======================================
           LIGHT MODE
           ======================================= */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            background-image: linear-gradient(135deg, #ffffff 30%, #002244 100%);
            min-height: 100vh;
        }

        .wrapper {
            padding: 40px 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .logo {
            background-color: #007bff;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 22px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        h2 {
            color: #333333;
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: #555555;
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .button-container {
            text-align: center;
            margin-top: 35px;
            margin-bottom: 25px;
        }

        .button {
            background-color: #007bff;
            color: #ffffff;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.3s;
        }

        .footer {
            font-size: 12px;
            color: #888888;
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }

        /* =======================================
           DARK MODE
           ======================================= */
        @media (prefers-color-scheme: dark) {
            body, .wrapper {
                background-image: none !important;
                background-color: #121212 !important;
            }

            .container {
                background-color: #1e1e1e !important;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5) !important;
            }

            h2 {
                color: #ffffff !important;
            }
            p {
                color: #e0e0e0 !important;
            }

            .footer {
                color: #aaaaaa !important;
                border-top: 1px solid #333333 !important;
            }

            .logo, .button {
                background-color: #0056b3 !important;
                color: #ffffff !important;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <div class="logo">Memento</div>
        <h2>Hoş geldin [[${name}]],</h2>
        <p>Hesabınızı aktifleştirmek için lütfen aşağıdaki butona tıklayınız, otomatik olarak uygulama ekranına yönlendirileceksiniz.</p>
        <div class="button-container">
            <a th:href="${verificationLink}" class="button">Hesabımı Doğrula</a>
        </div>
        <p class="footer">
            Bu bağlantı 24 saat boyunca geçerlidir. Eğer kaydı oluşturan siz değilseniz, bu e-postayı görmezden gelebilirsiniz.<br><br>
        </p>
    </div>
</div>
</body>
</html>
