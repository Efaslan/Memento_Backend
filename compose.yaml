version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: memento-redis
    ports:
      - "127.0.0.1:6379:6379"

  postgres:
    image: postgres:15
    container_name: memento-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: memento
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: