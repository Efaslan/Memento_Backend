name: Memento Production Deployment

on:
  push:
    branches: [ "main" ] # Auto deploy when pushed to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Pull the codes
        uses: actions/checkout@v3

      - name: 2. Setup java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3. Build the .jar
        run: mvn clean package -DskipTests

      - name: 4. SCP the .jar to Cloud
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "target/*.jar"
          target: "/root/memento/"
          strip_components: 1 # remove "target/" directory name and sent the .jar only

      - name: 5. Connect to the server, and restart Memento
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            sudo systemctl restart memento